# Student Companion Backend - Docker Compose
# For local development with all services

version: '3.8'

services:
  # Main API service
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - AWS_REGION=eu-north-1
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - HUGGINGFACE_FALLBACK_ENABLED=true
      - HUGGINGFACE_ENDPOINT=https://ngum-alu-chatbot.hf.space
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro  # AWS credentials
    depends_on:
      - dynamodb-local
      - opensearch
    networks:
      - student-companion

  # Local DynamoDB
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb-data:/data
    networks:
      - student-companion

  # Local OpenSearch
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - student-companion

  # OpenSearch Dashboards (optional - for debugging)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - student-companion

volumes:
  dynamodb-data:
  opensearch-data:

networks:
  student-companion:
    driver: bridge

