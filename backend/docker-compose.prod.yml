# Student Companion Backend - Production Docker Compose
# For production deployment (connects to AWS services)

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: student-companion-backend:latest
    container_name: student-companion-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - student-companion-prod

networks:
  student-companion-prod:
    driver: bridge

